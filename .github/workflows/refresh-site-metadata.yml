name: Refresh Site Metadata

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - '*.html'
      - 'blog/*.html'
      - 'projects/*.html'
      - 'style.css'
      - 'assets/js/*.js'
      - 'scripts/*.py'
      - 'robots.txt'

jobs:
  refresh-site-metadata:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate sitemap, feed and editorial blocks
        run: python scripts/build_site_metadata.py

      - name: Validate generated result
        run: python scripts/validate_site.py

      - name: Commit generated updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=(
            sitemap.xml
            feed.xml
            feed.txt
            index.html
            about.html
            blog.html
            projects.html
            now.html
            blog/*.html
            projects/*.html
          )

          if git diff --quiet -- "${FILES[@]}"; then
            echo "No generated metadata changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "chore(site): refresh feed sitemap and content indexes"
          git push
